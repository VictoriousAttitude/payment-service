[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mbt"
version = "0.1.0"
description = "model-based conformance testing of the live payment API"
readme = "README.md"
requires-python = ">=3.11"
# zero runtime dependencies on purpose, matching recon/ and chaos/: the
# reference model the conformance verdict rests on cannot drift with a
# third-party release, and urllib is enough for the HTTP leg.
dependencies = []

[dependency-groups]
dev = ["pytest>=8.0", "hypothesis>=6.100", "mypy>=1.10", "ruff>=0.5", "mutmut>=3.2"]

[tool.hatch.build.targets.wheel]
packages = ["src/mbt"]

[tool.ruff]
line-length = 88
target-version = "py311"
# generated by `mutmut run` - thousands of intentionally-mutated copies
extend-exclude = ["mutants"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "S"]

[tool.ruff.lint.per-file-ignores]
# asserts are the point in tests
"tests/*" = ["S101"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.mutmut]
# mutate only the pure reference model: it is the oracle the conformance
# verdict rests on. The client and the stateful machine need a live server
# and are out of scope for mutation runs.
source_paths = ["src/mbt/model.py"]
pytest_add_cli_args_test_selection = ["tests/test_model.py"]
