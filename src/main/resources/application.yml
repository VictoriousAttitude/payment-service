spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # Scrape target for Prometheus. Actuator is not behind the API-key filter
        # (it guards only /api/v1/**), so restrict it at the network layer in prod.
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: payment-service

logging:
  pattern:
    # Inject the MDC correlation ids into every line so a request and the
    # transaction it touched can be traced across logs.
    level: "%5p [req=%X{requestId:-},txn=%X{txnId:-}]"

payment:
  webhook:
    # HMAC secret shared with the payment provider. Override via env in prod.
    secret: ${WEBHOOK_SECRET:dev-webhook-secret-change-me}
    # Where the simulator (standing in for the provider) posts callbacks.
    callback-url: ${WEBHOOK_CALLBACK_URL:http://localhost:8080/api/v1/webhooks/provider-callback}
    # Max age (seconds) of a signed callback before it's rejected as a replay.
    tolerance-seconds: ${WEBHOOK_TOLERANCE_SECONDS:300}
  outbox:
    # How often the dispatcher drains PENDING events, and the delay before the
    # first run after startup.
    dispatch-interval-ms: 2000
    initial-delay-ms: 5000
  reconciliation:
    # How often the full reconciliation suite runs, and the startup delay before
    # the first sweep. Anomalies are logged as RECONCILIATION_ALERT for the
    # platform's log-based alert rule.
    interval-ms: ${RECONCILIATION_INTERVAL_MS:300000}
    initial-delay-ms: ${RECONCILIATION_INITIAL_DELAY_MS:60000}
    # A transaction sitting in a non-terminal state past this is flagged stuck.
    stuck-threshold-minutes: ${RECONCILIATION_STUCK_THRESHOLD_MINUTES:30}
  settlement:
    # How often the settlement batch runs and its startup delay. A capture is
    # settled once it is older than delay-minutes (T+1 default).
    interval-ms: ${SETTLEMENT_INTERVAL_MS:300000}
    initial-delay-ms: ${SETTLEMENT_INITIAL_DELAY_MS:30000}
    delay-minutes: ${SETTLEMENT_DELAY_MINUTES:1440}
  settlement-file:
    # Reconciliation window for uploaded acquirer settlement files: ledger
    # movements newer than this are pending (not yet expected in a file),
    # older ones absent from the file are MISSING_IN_SETTLEMENT. T+2 default,
    # matching the recon CLI.
    window-days: ${SETTLEMENT_FILE_WINDOW_DAYS:2}
    # Upload size cap; uploads over this are rejected with 413 before parsing.
    max-bytes: ${SETTLEMENT_FILE_MAX_BYTES:1048576}
  reserve:
    # Rolling reserve withheld at settlement against chargeback exposure:
    # rate in basis points of the settled net (floored, remainder to the
    # merchant) held for hold-days before release to the payable balance.
    # Industry standard is 5-10% for 90-180 days.
    rate-bps: ${RESERVE_RATE_BPS:1000}
    hold-days: ${RESERVE_HOLD_DAYS:90}
    # How often the release batch sweeps matured holds, and its startup delay.
    release-interval-ms: ${RESERVE_RELEASE_INTERVAL_MS:300000}
    release-initial-delay-ms: ${RESERVE_RELEASE_INITIAL_DELAY_MS:30000}
  payout:
    # Auto-payout sweep: disburses every merchant whose payable balance reaches
    # minimum-amount (minor units). Manual payouts via the API share the same
    # guarded path.
    interval-ms: ${PAYOUT_INTERVAL_MS:300000}
    initial-delay-ms: ${PAYOUT_INITIAL_DELAY_MS:60000}
    minimum-amount: ${PAYOUT_MINIMUM_AMOUNT:1000}
    # Confirm sweep: a PENDING payout older than confirm-delay-minutes is
    # marked PAID (T+N milestone; failures arrive via the bank channel).
    confirm-interval-ms: ${PAYOUT_CONFIRM_INTERVAL_MS:300000}
    confirm-initial-delay-ms: ${PAYOUT_CONFIRM_INITIAL_DELAY_MS:60000}
    confirm-delay-minutes: ${PAYOUT_CONFIRM_DELAY_MINUTES:60}
  authorization:
    # Scheduled sweep that expires authorizations not captured within the
    # validity window. Card auth holds are time-bounded; 7 days (10080m) default.
    interval-ms: ${AUTHORIZATION_EXPIRY_INTERVAL_MS:300000}
    initial-delay-ms: ${AUTHORIZATION_EXPIRY_INITIAL_DELAY_MS:30000}
    validity-minutes: ${AUTHORIZATION_VALIDITY_MINUTES:10080}
  provider:
    # Connect/read timeout on the outbound provider callback POST. A hung
    # provider must not pin a dispatcher thread; the circuit breaker counts the
    # timeout as a failure.
    timeout-ms: ${PROVIDER_TIMEOUT_MS:2000}

# Resilience around the outbound provider call. The circuit breaker sheds load
# when the provider degrades (fail fast instead of piling up timeouts); the
# retry absorbs transient blips. Aspect order is retry(circuitBreaker(call)),
# so a call rejected by an open breaker is not retried.
resilience4j:
  circuitbreaker:
    instances:
      paymentProvider:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      paymentProvider:
        max-attempts: 3
        wait-duration: 200ms

camunda:
  bpm:
    # The embedded process engine manages its own ACT_* tables; it creates and
    # upgrades them itself (separate from our Flyway-managed business schema,
    # which Hibernate validates). Our entities never map ACT_* tables, so the
    # two schema lifecycles do not collide.
    database:
      schema-update: true
    # No-op history is enough for orchestration; AUDIT would bloat the DB.
    history-level: activity
    deployment-resource-pattern: classpath*:**/*.bpmn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
