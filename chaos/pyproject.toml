[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chaos"
version = "0.1.0"
description = "jepsen-lite chaos harness for the payment ledger"
readme = "README.md"
requires-python = ">=3.11"
# zero runtime dependencies on purpose: the checker whose verdict the
# "provable under faults" claim rests on cannot drift with a third-party
# release, and urllib/subprocess are enough for the HTTP and kubectl legs.
dependencies = []

[project.scripts]
chaos = "chaos.cli:main"

[dependency-groups]
dev = ["pytest>=8.0", "hypothesis>=6.100", "mypy>=1.10", "ruff>=0.5"]

[tool.hatch.build.targets.wheel]
packages = ["src/chaos"]

[tool.ruff]
line-length = 88
target-version = "py311"
# generated by `mutmut run` - thousands of intentionally-mutated copies
extend-exclude = ["mutants"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "S"]

[tool.ruff.lint.per-file-ignores]
# asserts are the point in tests
"tests/*" = ["S101"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.mutmut]
# mutate only the pure core: the history model and the checker are the code
# whose correctness the "provable" claim rests on. The driver (workload,
# nemesis, collector) and CLI are I/O glue that needs a live cluster and is out
# of scope, so the mutation run drives only the tests that exercise the core.
source_paths = ["src/chaos/domain/"]
pytest_add_cli_args_test_selection = [
    "tests/test_history.py",
    "tests/test_checker.py",
    "tests/test_properties.py",
]
