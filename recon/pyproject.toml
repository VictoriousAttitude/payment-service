[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recon"
version = "0.1.0"
description = "external-oracle reconciliation for the payment ledger"
readme = "README.md"
requires-python = ">=3.11"
# zero runtime dependencies on purpose: the matching core cannot drift with a
# third-party release, and the engine is trivially auditable.
dependencies = []

[project.scripts]
recon = "recon.cli:main"
procsim = "recon.procsim.cli:main"

[dependency-groups]
dev = ["pytest>=8.0", "hypothesis>=6.100", "mypy>=1.10", "ruff>=0.5"]

[tool.hatch.build.targets.wheel]
packages = ["src/recon"]

[tool.ruff]
line-length = 88
target-version = "py311"
# generated by `mutmut run` - thousands of intentionally-mutated copies
extend-exclude = ["mutants"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.mutmut]
# mutate the pure domain core - the code whose correctness the "provable"
# claim rests on. Adapters/CLI are I/O glue and out of scope, so the mutation
# run drives only the tests that exercise the core (mutmut copies just the
# domain package into mutants/, so adapter/cli tests cannot import there).
source_paths = ["src/recon/domain/"]
pytest_add_cli_args_test_selection = [
    "tests/test_money.py",
    "tests/test_reconcile.py",
    "tests/test_properties.py",
]
