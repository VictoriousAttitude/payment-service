apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The core runnable slice. Not applied directly — `k8s/` (thin alias) and
# `k8s/backup/` (WORM variant) both build on this as a sibling base, because
# kustomize forbids an overlay from rooting itself in an ancestor directory.
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-cluster.yaml
  - deployment.yaml
  - service.yaml
  - pdb.yaml
  - hpa.yaml
  - networkpolicy.yaml
