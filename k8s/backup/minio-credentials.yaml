apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: payments
type: Opaque
stringData:
  # PLACEHOLDER local credentials. In a real cluster this is a managed S3/GCS
  # bucket and the credentials come from an external secrets manager. The same
  # keys double as MinIO's root user and as the S3 credentials CNPG uses.
  ACCESS_KEY_ID: payments-backup
  SECRET_ACCESS_KEY: payments-backup-change-me
