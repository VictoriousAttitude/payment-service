apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-service
  namespace: payments
spec:
  # Keep at least one pod serving through VOLUNTARY disruptions (node drain,
  # cluster upgrade). With replicas: 2 this lets the scheduler evict one pod at
  # a time but never both, so a rolling node upgrade cannot black out the API.
  minAvailable: 1
  selector:
    matchLabels:
      app: payment-service
