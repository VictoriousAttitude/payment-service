apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secrets
  namespace: payments
type: Opaque
stringData:
  # HMAC secret shared with the payment provider for webhook signing. This is a
  # PLACEHOLDER for local runs - in a real cluster this Secret is supplied by an
  # external secrets manager (External Secrets Operator / Vault / cloud KMS) and
  # never committed. The Postgres credentials are NOT here: CNPG generates them
  # into the `payments-db-app` Secret, which the Deployment references directly.
  WEBHOOK_SECRET: dev-webhook-secret-change-me
