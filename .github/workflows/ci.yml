name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jvm:
    name: jvm (detekt, test, pitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: make gradlew executable
        run: chmod +x gradlew

      # test runs the full Testcontainers suite and ModularityTest (module
      # boundary verification); detekt enforces static analysis against a
      # baseline; pitest mutation tests the pure money and security core.
      - name: detekt, test, pitest
        run: ./gradlew detekt test pitest --no-daemon

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-reports
          path: |
            build/reports/tests/test
            build/reports/pitest
            build/reports/detekt
          if-no-files-found: ignore

  # every python core in the repo carries the same gate: the recon oracle and
  # anchor verifier, the chaos checker, and the mbt conformance model. each is
  # a pure functional core, so each is mutation-tested to zero survivors. the
  # mbt live-conformance module and the chaos driver need a running system and
  # skip themselves here; only the pure cores are gated.
  python:
    name: python ${{ matrix.project }} (ruff, mypy, pytest, mutmut)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [recon, mbt, chaos]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - name: set up python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install dev tools
        run: pip install pytest hypothesis mypy ruff mutmut

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy

      - name: pytest
        run: pytest -q

      # the cores claim to be provable; the mutation run proves the tests
      # actually kill injected faults. any survivor fails the build.
      - name: mutation testing (zero survivors)
        run: |
          mutmut run
          mutmut results
          if mutmut results | grep -qE ': survived'; then
            echo "::error::surviving mutants found in ${{ matrix.project }}"
            exit 1
          fi
